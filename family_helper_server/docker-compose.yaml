services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: family_helper
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD}
    volumes:
      - family_helper_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass ${DEV_REDIS_PASSWORD}
    environment:
      - REDIS_REPLICATION_MODE=master

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio_init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo 'Waiting for MinIO...'
          sleep 2
        done
        mc mb --ignore-existing local/${MINIO_BUCKET:-family-helper}
        cat > /tmp/cors.json <<'EOF'
        [
          {
            "AllowedOrigins": ["http://localhost:8082", "http://localhost:3000", "http://127.0.0.1:8082", "http://127.0.0.1:3000"],
            "AllowedMethods": ["GET", "PUT", "POST", "HEAD", "DELETE"],
            "AllowedHeaders": ["*"],
            "ExposeHeaders": ["ETag"],
            "MaxAgeSeconds": 3000
          }
        ]
        EOF
        mc cors set local/${MINIO_BUCKET:-family-helper} /tmp/cors.json
        echo 'MinIO initialized'

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: family_helper_test
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
    volumes:
      - family_helper_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass ${TEST_REDIS_PASSWORD}
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  family_helper_data:
  family_helper_test_data:
  minio_data:
