services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: family_helper
      POSTGRES_PASSWORD: "s_nAB2yuVVbzrIzytD63HyiOWUUDzKPw"
    volumes:
      - family_helper_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "CQb-JIwHfjGFleHG-eiE01JV_th3z9DN"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: family_helper_test
      POSTGRES_PASSWORD: "5_h_NGIbTfnFdvl2v_-NSv9xtfxzWK7E"
    volumes:
      - family_helper_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "0D9GiwOtWk1zduuPiE0Jmb1hk552tQlr"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  family_helper_data:
  family_helper_test_data:
