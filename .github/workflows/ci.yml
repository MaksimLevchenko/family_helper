name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  server:
    name: Server Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family_helper_server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Test
        run: dart test

  flutter:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family_helper_flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Test
        run: flutter test
